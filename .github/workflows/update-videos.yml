name: Mise à jour des vidéos YouTube

on:
  schedule:
    - cron: "17 */6 * * *"   # toutes les 6 heures
  workflow_dispatch: {}       # bouton "Run workflow" pour forcer manuellement

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Récupérer les dernières vidéos (flux RSS YouTube)
        run: python3 scripts/update_videos.py

      - name: Pousser le résultat si quelque chose a changé
        run: |
          git config user.name "celte-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/videos.json
          if git diff --cached --quiet; then
            echo "Aucune nouvelle vidéo — rien à pousser."
          else
            git commit -m "🤖 Mise à jour des dernières vidéos YouTube"
            git push
          fi
